name: PrestaShop Test Automation

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  schedule:
    # Run tests daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
        - all
        - enhanced
        - core
        - smoke

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 18
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps ${{ matrix.browser }}
      
    - name: Run Playwright tests
      run: |
        if [ "${{ github.event.inputs.test_suite }}" == "enhanced" ]; then
          npx playwright test tests/enhanced-checkout-flow.spec.ts --project=${{ matrix.browser }}
        elif [ "${{ github.event.inputs.test_suite }}" == "core" ]; then
          npx playwright test tests/homepage-navigation.spec.ts tests/product-search.spec.ts tests/shopping-cart.spec.ts --project=${{ matrix.browser }}
        elif [ "${{ github.event.inputs.test_suite }}" == "smoke" ]; then
          npx playwright test tests/site-validation.spec.ts tests/simplified-checkout.spec.ts --project=${{ matrix.browser }}
        else
          npx playwright test --project=${{ matrix.browser }}
        fi
      env:
        CI: true
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report-${{ matrix.browser }}
        path: |
          playwright-report/
          test-results/
        retention-days: 30
        
    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: screenshots-${{ matrix.browser }}
        path: test-results/**/*.png
        retention-days: 7

  report:
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      
    - name: Generate combined report
      run: |
        echo "# PrestaShop Test Automation Report" > test-summary.md
        echo "" >> test-summary.md
        echo "**Date:** $(date)" >> test-summary.md
        echo "**Commit:** ${{ github.sha }}" >> test-summary.md
        echo "" >> test-summary.md
        
        # Count test results from each browser
        for browser in chromium firefox webkit; do
          if [ -d "playwright-report-$browser" ]; then
            echo "## $browser Results" >> test-summary.md
            # This would need to parse actual test results
            echo "Tests completed for $browser" >> test-summary.md
            echo "" >> test-summary.md
          fi
        done
        
    - name: Comment on PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('test-summary.md', 'utf8');
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          });

  slack-notification:
    needs: [test, report]
    runs-on: ubuntu-latest
    if: always() && github.ref == 'refs/heads/master'
    
    steps:
    - name: Slack Notification
      if: env.SLACK_WEBHOOK_URL != ''
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#test-automation'
        text: |
          PrestaShop Test Automation Results
          Branch: ${{ github.ref }}
          Commit: ${{ github.sha }}
          Status: ${{ job.status }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK_URL }}
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}